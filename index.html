<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Karl Luis – Fachinformatiker für Systemintegration</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

<style>
:root {
  --primary: #3b82f6;
  --text: #e5e7eb;
  --muted: #94a3b8;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  color: var(--text);
  background: url("a_portfolio_website_webpage_for_karl_luis_a_fachi.png") 
              no-repeat center center/cover;
}

/* Dark Overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(5, 10, 25, 0.75);
  backdrop-filter: blur(4px);
  z-index: 0;
}

nav {
  position: absolute;
  top: 40px;
  right: 80px;
  z-index: 2;
}

nav a {
  margin-left: 40px;
  text-decoration: none;
  color: var(--muted);
  font-size: 15px;
  transition: 0.3s;
}

nav a:hover {
  color: var(--primary);
}

.socials {
  position: absolute;
  left: 50px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 30px;
  z-index: 2;
}

.socials i {
  font-size: 22px;
  color: var(--muted);
  cursor: pointer;
  transition: 0.3s;
}

.socials i:hover {
  color: var(--primary);
  transform: scale(1.2);
}

.container {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  height: 100%;
  padding-left: 120px;
}

.text {
  max-width: 600px;
}

.text h1 {
  font-size: 60px;
  margin-bottom: 15px;
}

.text h2 {
  font-weight: 300;
  font-size: 30px;
  color: #60a5fa;
  margin-bottom: 30px;
}

.text p {
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 40px;
  font-size: 18px;
}

.btn {
  padding: 15px 40px;
  border: 1px solid var(--primary);
  background: transparent;
  color: var(--primary);
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(59,130,246,0.5);
}

.btn:hover {
  background: var(--primary);
  color: white;
  box-shadow: 0 0 25px rgba(59,130,246,0.9);
}
</style>
</head>

<body>

<nav>
  <a href="#">About</a>
  <a href="#">Projects</a>
  <a href="#">Contact</a>
</nav>

<div class="socials">
  <i class="fab fa-github"></i>
  <i class="fab fa-linkedin"></i>
  <i class="fab fa-instagram"></i>
</div>

<div class="container">
  <div class="text">
    <h1>Karl Luis</h1>
    <h2>Fachinformatiker für Systemintegration</h2>
    <p>
      Ich entwickle moderne Webanwendungen, kreative Interfaces
      und performante IT-Infrastrukturen. Leidenschaft für saubere
      Systemarchitektur und stabile Netzwerklösungen.
    </p>
    <a href="#" class="btn">Reach Me</a>
  </div>
</div>

</body>
</html>
